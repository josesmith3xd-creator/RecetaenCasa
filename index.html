// ============================================================
//  FUNCIONES DE RENDERIZADO
// ============================================================

let paisActual = 'todos';

function renderizarPaises() {
    const contenedor = document.getElementById('filtroPaises');
    const paises = Object.keys(recetasData);
    contenedor.innerHTML = '<button class="pais activo" data-pais="todos">🌍 Todos</button>';
    paises.forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'pais';
        btn.dataset.pais = key;
        btn.textContent = recetasData[key].bandera + ' ' + recetasData[key].nombre;
        btn.onclick = () => filtrarPorPais(key);
        contenedor.appendChild(btn);
    });
}

function filtrarPorPais(pais) {
    paisActual = pais;
    document.querySelectorAll('.pais').forEach(b => b.classList.remove('activo'));
    document.querySelector(`.pais[data-pais="${pais}"]`)?.classList.add('activo');
    renderizarRecetas();
}

function renderizarRecetas() {
    const grid = document.getElementById('listaRecetas');
    const busqueda = document.getElementById('buscar').value.toLowerCase().trim();
    const contador = document.getElementById('contadorRecetas');
    let resultados = [];

    Object.keys(recetasData).forEach(paisKey => {
        if (paisActual !== 'todos' && paisKey !== paisActual) return;
        const pais = recetasData[paisKey];
        pais.recetas.forEach(receta => {
            const texto = (receta.nombre + ' ' + receta.descripcion + ' ' + pais.nombre + ' ' + receta.ingredientes.join(' ')).toLowerCase();
            if (busqueda && !texto.includes(busqueda)) return;
            resultados.push({ ...receta, paisKey, bandera: pais.bandera, paisNombre: pais.nombre });
        });
    });

    contador.textContent = resultados.length + ' recetas encontradas';

    if (resultados.length === 0) {
        grid.innerHTML = '<div class="sin-resultados">🍽️ No se encontraron recetas. Intenta con otra búsqueda.</div>';
        return;
    }

    grid.innerHTML = resultados.map(r => `
        <div class="tarjeta">
            <div class="bandera-tarjeta">${r.bandera}</div>
            <div class="info-tarjeta">
                <h3>${r.nombre}</h3>
                <p><strong>${r.paisNombre}</strong> · ${r.descripcion}</p>
                <button class="ver-receta" onclick="abrirModal('${r.paisKey}','${r.nombre.replace(/'/g,"\\'")}')">Ver receta</button>
            </div>
        </div>
    `).join('');
}

function abrirModal(paisKey, recetaNombre) {
    const pais = recetasData[paisKey];
    const receta = pais.recetas.find(r => r.nombre === recetaNombre);
    if (!receta) return;

    const modal = document.getElementById('modalReceta');
    const contenido = document.getElementById('contenidoModal');
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';

    contenido.innerHTML = `
        <h2>${receta.nombre}</h2>
        <div class="origen">${pais.bandera} ${pais.nombre}</div>
        <p style="margin-bottom:1rem;color:#666;">${receta.descripcion}</p>
        <h3>🛒 Ingredientes</h3>
        <ul>${receta.ingredientes.map(i => `<li>${i}</li>`).join('')}</ul>
        <h3>👨‍🍳 Preparación</h3>
        <ol>${receta.preparacion.map(p => `<li>${p}</li>`).join('')}</ol>
    `;
}

function cerrarModal() {
    document.getElementById('modalReceta').style.display = 'none';
    document.body.style.overflow = 'auto';
}

// Cerrar modal con ESC
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') cerrarModal();
});

// Cerrar modal al hacer clic fuera
document.getElementById('modalReceta').addEventListener('click', e => {
    if (e.target === e.currentTarget) cerrarModal();
});

// Buscar en tiempo real
document.getElementById('buscar').addEventListener('input', renderizarRecetas);

// Inicializar
renderizarPaises();
renderizarRecetas();
</script>
