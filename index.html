<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnimeVerse · Buscador con Jikan API</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    /* ----- RESET Y BASE ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f1ea;
      color: #1e1e2a;
      padding: 0 20px;
    }

    /* ----- HEADER ----- */
    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 2px solid #e0d6c8;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #f43b47, #ff6a88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      font-weight: 400;
      -webkit-text-fill-color: #1e1e2a;
      background: none;
    }

    nav a {
      text-decoration: none;
      color: #1e1e2a;
      font-weight: 600;
      margin-left: 25px;
      transition: color 0.2s;
    }
    nav a:hover {
      color: #f43b47;
    }

    /* ----- BUSCADOR ----- */
    .search-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 30px;
    }

    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 500px;
    }

    #search-input {
      width: 100%;
      padding: 14px 20px;
      border: 2px solid #d6cdc0;
      border-radius: 50px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      background: #ffffffcc;
      backdrop-filter: blur(4px);
    }

    #search-input:focus {
      border-color: #f43b47;
      box-shadow: 0 0 0 4px rgba(244, 59, 71, 0.15);
    }

    .search-status {
      margin-top: 10px;
      font-size: 14px;
      color: #7a7065;
      min-height: 24px;
    }

    /* ----- GRID DE ANIMES ----- */
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 30px;
      max-width: 1300px;
      margin: 0 auto;
    }

    /* ----- TARJETA DE ANIME ----- */
    .anime-card {
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      transition: transform 0.25s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .anime-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
    }

    .anime-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      background: #eae5dc;
    }

    .anime-card .card-body {
      padding: 18px 18px 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .anime-card .card-body h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .anime-card .card-body .year {
      font-size: 14px;
      color: #888080;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .anime-card .card-body p {
      font-size: 15px;
      line-height: 1.5;
      color: #3d3d4a;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .anime-card .card-body .tag {
      display: inline-block;
      margin-top: 14px;
      background: #f0ebe4;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      color: #6b5f55;
      align-self: flex-start;
    }

    /* ----- MENSAJES ----- */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      color: #8f8479;
      padding: 60px 0;
    }

    .loading {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 18px;
      color: #7a7065;
      padding: 40px 0;
    }

    .error-message {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 16px;
      color: #d32f2f;
      padding: 20px 0;
      background: #ffebee;
      border-radius: 12px;
      margin: 10px 0;
    }

    /* ----- FOOTER ----- */
    footer {
      text-align: center;
      padding: 40px 0 20px;
      margin-top: 40px;
      border-top: 2px solid #e0d6c8;
      color: #7a7065;
      font-size: 14px;
    }

    footer a {
      color: #f43b47;
      text-decoration: none;
      font-weight: 600;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      nav a {
        margin-left: 0;
        margin-right: 20px;
      }
      .anime-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .anime-card img {
        height: 220px;
      }
    }

    @media (max-width: 420px) {
      .anime-grid {
        grid-template-columns: 1fr;
      }
      .anime-card img {
        height: 280px;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Anime<span>Verse</span></div>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Populares</a>
      <a href="#">Próximos</a>
    </nav>
  </header>

  <!-- BUSCADOR -->
  <div class="search-section">
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="🔍 Busca tu anime favorito..." />
    </div>
    <div class="search-status" id="search-status">Escribe para buscar (ej: Naruto)</div>
  </div>

  <!-- GRID DE ANIMES -->
  <div class="anime-grid" id="anime-grid">
    <!-- Los resultados se pintan aquí -->
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 AnimeVerse · Hecho con ❤️ · Datos de <a href="https://myanimelist.net" target="_blank">MyAnimeList</a> vía <a href="https://jikan.moe" target="_blank">Jikan API</a></p>
  </footer>

  <script>
    // ----- ELEMENTOS DOM -----
    const searchInput = document.getElementById('search-input');
    const grid = document.getElementById('anime-grid');
    const status = document.getElementById('search-status');

    // ----- VARIABLES DE CONTROL -----
    let timeoutId = null;
    let isFetching = false;

    // ----- FUNCIÓN PARA RENDERIZAR ANIMES -----
    function renderAnimes(animeList) {
      grid.innerHTML = '';

      if (!animeList || animeList.length === 0) {
        grid.innerHTML = '<div class="no-results">😕 No se encontraron animes para esa búsqueda.</div>';
        return;
      }

      animeList.forEach(anime => {
        const card = document.createElement('div');
        card.className = 'anime-card';

        // Datos seguros
        const title = anime.title || 'Sin título';
        const year = anime.year || anime.aired?.prop?.from?.year || 'Desconocido';
        const synopsis = anime.synopsis || 'Sin sinopsis disponible.';
        const genre = anime.genres && anime.genres.length > 0 ? anime.genres[0].name : 'Sin género';
        const imageUrl = anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '';

        card.innerHTML = `
          <img src="${imageUrl}" alt="${title}" loading="lazy" 
               onerror="this.src='https://via.placeholder.com/250x320/d6cdc0/7a7065?text=${encodeURIComponent(title)}'" />
          <div class="card-body">
            <h3>${title}</h3>
            <div class="year">${year}</div>
            <p>${synopsis}</p>
            <span class="tag">${genre}</span>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    // ----- FUNCIÓN PARA MOSTRAR ESTADO -----
    function setStatus(text, isError = false) {
      status.textContent = text;
      status.style.color = isError ? '#d32f2f' : '#7a7065';
    }

    // ----- FUNCIÓN PRINCIPAL DE BÚSQUEDA (con debounce) -----
    function performSearch(query) {
      // Limpiar timeout anterior
      if (timeoutId) {
        clearTimeout(timeoutId);
        timeoutId = null;
      }

      // Si la consulta está vacía, mostramos mensaje y limpiamos grid
      if (!query.trim()) {
        grid.innerHTML = '';
        setStatus('✏️ Escribe para buscar (ej: Naruto)');
        return;
      }

      // Debounce: esperar 500ms después de dejar de escribir
      timeoutId = setTimeout(async () => {
        // Evitar múltiples peticiones simultáneas
        if (isFetching) return;
        isFetching = true;
        setStatus('⏳ Buscando...');

        try {
          // Llamada a la API de Jikan (búsqueda por nombre)
          const url = `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=12&sfw=true`;
          const response = await fetch(url);

          if (!response.ok) {
            throw new Error(`Error HTTP: ${response.status}`);
          }

          const data = await response.json();
          const results = data.data || [];

          if (results.length === 0) {
            renderAnimes([]);
            setStatus(`🔍 No hay resultados para "${query}"`);
          } else {
            renderAnimes(results);
            setStatus(`✅ Mostrando ${results.length} resultados para "${query}"`);
          }

        } catch (error) {
          console.error('Error al buscar:', error);
          grid.innerHTML = `<div class="error-message">⚠️ Ocurrió un error al buscar. Intenta de nuevo más tarde.</div>`;
          setStatus('❌ Error de conexión', true);
        } finally {
          isFetching = false;
          timeoutId = null;
        }
      }, 500); // 500ms de debounce
    }

    // ----- EVENTO DE INPUT -----
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value;
      performSearch(query);
    });

    // ----- BÚSQUEDA INICIAL CON UN ANIME POPULAR (opcional) -----
    // Cargar algo al inicio para que no se vea vacío
    window.addEventListener('load', () => {
      // Mostrar un mensaje amigable
      grid.innerHTML = `
        <div class="no-results" style="padding: 30px 0; font-size: 18px;">
          🌟 Busca tu anime favorito usando el buscador.
        </div>
      `;
      // Opcional: cargar automáticamente "Naruto" como ejemplo
      // searchInput.value = 'Naruto';
      // performSearch('Naruto');
    });

    // ----- MANEJO DE RATE LIMIT (opcional) -----
    // La API de Jikan permite 3 requests por segundo, con debounce evitamos excedernos.
    // Si queremos ser más cuidadosos, podemos añadir un delay extra, pero con debounce es suficiente.
  </script>
</body>
</html>
